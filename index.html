<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pust</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07192e;
            --primary: #bae6fd;
            --accent: rgba(56, 189, 248, 0.7);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .breath-circle {
            position: relative;
            width: 240px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            pointer-events: none;
        }

        circle {
            fill: transparent;
            stroke-width: 2;
        }

        .bg-ring {
            stroke: rgba(255, 255, 255, 0.15);
        }

        .progress {
            stroke: var(--accent);
            stroke-dasharray: 754;
            stroke-dashoffset: 754;
            stroke-linecap: round;
        }

        .breathing {
            animation: scale 10s infinite ease-in-out;
        }

        .breathing .progress {
            animation: progress 10s infinite ease-in-out;
        }

        @keyframes scale {
            0%, 100% { transform: scale(0.85); }
            50% { transform: scale(1.1); }
        }

        @keyframes progress {
            0%, 100% { stroke-dashoffset: 754; opacity: 0.3; }
            50% { stroke-dashoffset: 0; opacity: 1; }
        }

        .content {
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        #timer {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.3);
            font-variant-numeric: tabular-nums;
        }

        #plus {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            padding: 20px;
        }

        [hidden] {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="breath-circle" class="breath-circle" onclick="handleClick()">
        <svg viewBox="0 0 242 242">
            <circle class="bg-ring" cx="121" cy="121" r="120"/>
            <circle class="progress" cx="121" cy="121" r="120"/>
        </svg>
        <div class="content">
            <div id="timer" hidden>00:00</div>
            <div id="plus">+5</div>
        </div>
    </div>

    <script>
        let timeLeft = 0, timerId = null, wakeLock = null;

        const updateDisplay = () => {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        };

        const toggleLock = async (on) => {
            if (!('wakeLock' in navigator)) return;
            try {
                if (on) wakeLock = await navigator.wakeLock.request('screen');
                else if (wakeLock) { wakeLock.release(); wakeLock = null; }
            } catch {}
        };

        function handleClick() {
            if (timerId) reset();
            else start(300);
        }

        function start(sec) {
            const startTime = Date.now();
            const totalMs = sec * 1000;
            
            timeLeft = sec;
            updateDisplay();
            
            document.getElementById('plus').hidden = true;
            document.getElementById('timer').hidden = false;
            document.getElementById('breath-circle').classList.add('breathing');
            
            toggleLock(true);

            timerId = setInterval(() => {
                const elapsed = Date.now() - startTime;
                timeLeft = Math.max(0, Math.ceil((totalMs - elapsed) / 1000));
                updateDisplay();
                if (timeLeft <= 0) reset();
            }, 100);
        }

        function reset() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 0;
            document.getElementById('plus').hidden = false;
            document.getElementById('timer').hidden = true;
            document.getElementById('breath-circle').classList.remove('breathing');
            toggleLock(false);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && timeLeft > 0) toggleLock(true);
        });
    </script>
</body>
</html>
