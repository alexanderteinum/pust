<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pust</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07192e;
            --fg-dim: #3d576c;
            --fg-subtle: #5d728d;
            --ring-bg: #22384d;
            --accent: #298cbb;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8fafc;
                --fg-dim: #94a3b8;
                --fg-subtle: #6b7280;
                --ring-bg: #cbd5e1;
                --accent: #0284c7;
            }
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.5s ease;
        }

        .breath-circle {
            position: relative;
            width: 240px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
        }

        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            pointer-events: none;
        }

        circle {
            fill: transparent;
            stroke-width: 1;
        }

        .bg-ring {
            stroke: var(--ring-bg);
            transition: stroke 0.5s ease;
        }

        .progress {
            stroke: var(--accent);
            stroke-dasharray: 754 754;
            stroke-dashoffset: 754;
            stroke-linecap: round;
        }

        .breathing {
            animation: scale 19s infinite ease-in-out;
        }

        .breathing .progress {
            animation: progress 19s infinite ease-in-out;
        }

        @keyframes scale {
            0% { transform: scale(0.85); }
            21.05% { transform: scale(1.1); }
            57.89% { transform: scale(1.1); }
            100% { transform: scale(0.85); }
        }

        @keyframes progress {
            0% { stroke-dashoffset: 2262; }
            21.05% { stroke-dashoffset: 1508; }
            57.89% { stroke-dashoffset: 1508; }
            100% { stroke-dashoffset: 754; }
        }

        .content {
            z-index: 10;
            text-align: center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #phase-label {
            font-size: 1.1rem;
            color: var(--fg-subtle);
            text-transform: lowercase;
            margin-bottom: 4px;
        }

        #phase-timer {
            font-size: 3.5rem;
            color: var(--accent);
            font-weight: 300;
            line-height: 1;
        }

        #cycle-dots {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            border: 1px solid var(--fg-dim);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .dot.filled {
            background: var(--fg-dim);
        }

        #start {
            font-size: 1.4rem;
            color: var(--fg-subtle);
            text-transform: lowercase;
            padding: 20px;
            transition: color 0.5s ease;
        }

        [hidden] {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="breath-circle" class="breath-circle" onclick="handleClick()">
        <svg viewBox="0 0 242 242">
            <circle class="bg-ring" cx="121" cy="121" r="120"/>
            <circle class="progress" cx="121" cy="121" r="120"/>
        </svg>
        <div class="content">
            <div id="phase-label" hidden></div>
            <div id="phase-timer" hidden></div>
            <div id="cycle-dots" hidden>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div id="start">Start</div>
        </div>
    </div>

    <script>
        let timeLeft = 0, timerId = null, wakeLock = null;

        const updateDisplay = (elapsedMs) => {
            if (elapsedMs !== undefined) {
                const totalCycle = 19000;
                const inCycle = elapsedMs % totalCycle;
                const completedCycles = Math.floor(elapsedMs / totalCycle);
                
                let label, phaseTime;

                if (inCycle < 4000) {
                    label = "Pust inn";
                    phaseTime = Math.ceil((4000 - inCycle) / 1000);
                } else if (inCycle < 11000) {
                    label = "Hold";
                    phaseTime = Math.ceil((11000 - inCycle) / 1000);
                } else {
                    label = "Pust ut";
                    phaseTime = Math.ceil((19000 - inCycle) / 1000);
                }

                document.getElementById('phase-label').textContent = label;
                document.getElementById('phase-timer').textContent = phaseTime;

                const dots = document.querySelectorAll('.dot');
                dots.forEach((dot, i) => {
                    dot.classList.toggle('filled', i < completedCycles);
                });
            }
        };

        const toggleLock = async (on) => {
            if (!('wakeLock' in navigator)) return;
            try {
                if (on) wakeLock = await navigator.wakeLock.request('screen');
                else if (wakeLock) { wakeLock.release(); wakeLock = null; }
            } catch {}
        };

        function handleClick() {
            if (timerId) reset();
            else start(76);
        }

        function start(sec) {
            const startTime = Date.now();
            const totalMs = sec * 1000;
            
            timeLeft = sec;
            updateDisplay(0);
            
            document.getElementById('start').hidden = true;
            document.getElementById('phase-label').hidden = false;
            document.getElementById('phase-timer').hidden = false;
            document.getElementById('cycle-dots').hidden = false;
            document.getElementById('breath-circle').classList.add('breathing');
            
            toggleLock(true);

            timerId = setInterval(() => {
                const elapsed = Date.now() - startTime;
                timeLeft = Math.max(0, Math.ceil((totalMs - elapsed) / 1000));
                
                if (timeLeft <= 0) reset();
                else updateDisplay(elapsed);
            }, 100);
        }

        function reset() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 0;
            document.getElementById('start').hidden = false;
            document.getElementById('phase-label').hidden = true;
            document.getElementById('phase-timer').hidden = true;
            document.getElementById('cycle-dots').hidden = true;
            document.getElementById('breath-circle').classList.remove('breathing');
            document.querySelectorAll('.dot').forEach(dot => dot.classList.remove('filled'));
            toggleLock(false);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && timeLeft > 0) toggleLock(true);
        });
    </script>
</body>
</html>
