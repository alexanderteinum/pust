<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zen-circle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #07192e;
            color: #bae6fd;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .zen-circle {
            position: relative;
            width: 240px;
            aspect-ratio: 1;
            border-radius: 50%;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            pointer-events: none;
        }

        .progress-ring__circle {
            stroke: rgba(56, 189, 248, 0.7);
            stroke-width: 2;
            fill: transparent;
            stroke-dasharray: 754 754;
            stroke-dashoffset: 754;
            stroke-linecap: round;
        }

        .progress-ring__bg {
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 2;
            fill: transparent;
        }

        .zen-circle.breathing {
            animation: breathe-scale 10s infinite ease-in-out;
        }

        .zen-circle.breathing .progress-ring__circle {
            animation: breathe-progress 10s infinite ease-in-out;
        }

        @keyframes breathe-scale {
            0%, 100% { transform: scale(0.85); }
            50% { transform: scale(1.1); }
        }

        @keyframes breathe-progress {
            0% { stroke-dashoffset: 754; opacity: 0.3; }
            50% { stroke-dashoffset: 0; opacity: 1; }
            100% { stroke-dashoffset: -754; opacity: 0.3; }
        }

        .content-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #timer {
            font-size: 1.2rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.3);
            font-variant-numeric: tabular-nums;
            display: none;
            cursor: pointer;
            padding: 20px;
        }

        .time-options {
            display: flex;
            gap: 2rem;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
        }

        .time-options span {
            cursor: pointer;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div id="circle" class="zen-circle">
        <svg class="progress-ring" viewBox="0 0 242 242">
            <circle class="progress-ring__bg" cx="121" cy="121" r="120"></circle>
            <circle id="progressCircle" class="progress-ring__circle" cx="121" cy="121" r="120"></circle>
        </svg>

        <div class="content-area">
            <div id="timer" onclick="reset()">00:00</div>
            <div id="controls" class="time-options">
                <span onclick="startTimer(300)">5</span>
                <span onclick="startTimer(600)">10</span>
                <span onclick="startTimer(900)">15</span>
            </div>
        </div>
    </div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isRunning = false;
        let wakeLock = null;

        const circle = document.getElementById('circle');
        const timerDisplay = document.getElementById('timer');
        const controls = document.getElementById('controls');

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.log(`Wake Lock error: ${err.name}, ${err.message}`);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        async function startTimer(seconds) {
            timeLeft = seconds;
            isRunning = true;
            await requestWakeLock();
            controls.style.display = 'none';
            timerDisplay.style.display = 'block';
            circle.classList.add('breathing');
            updateDisplay();
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    reset();
                }
            }, 1000);
        }

        function reset() {
            isRunning = false;
            clearInterval(timerId);
            circle.classList.remove('breathing');
            releaseWakeLock();
            controls.style.display = 'flex';
            timerDisplay.style.display = 'none';
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isRunning) {
                await requestWakeLock();
            }
        });

        updateDisplay();
    </script>
</body>
</html>
