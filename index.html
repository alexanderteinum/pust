<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pust</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07192e;
            --fg: #3d576c;
            --accent: #298cbb;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8fafc;
                --fg: #94a3b8;
                --accent: #0284c7;
            }
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.5s ease;
        }

        .breath-circle {
            position: relative;
            width: 240px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            border: 1px solid var(--fg);
            background: transparent;
        }

        #inner-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--fg);
            border-radius: 50%;
            transform: scale(0.4);
            opacity: 0.15;
            pointer-events: none;
        }

        .breathing {
            animation: scale-outer 8s infinite ease-in-out;
        }

        .breathing #inner-circle {
            animation: scale-inner 8s infinite ease-in-out;
        }

        @keyframes scale-outer {
            0% { transform: scale(0.85); }
            50% { transform: scale(1.1); }
            100% { transform: scale(0.85); }
        }

        @keyframes scale-inner {
            0% { transform: scale(0.4); }
            50% { transform: scale(0.90); }
            100% { transform: scale(0.4); }
        }

        #start, #timer {
            z-index: 10;
            font-size: 1.4rem;
            color: var(--fg);
            text-transform: lowercase;
            transition: color 0.3s ease;
        }

        @media (hover: hover) {
            #start:hover {
                color: var(--accent);
            }
        }

        [hidden] {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="breath-circle" class="breath-circle" onclick="handleClick()">
        <div id="inner-circle" hidden></div>
        <div id="start">Start</div>
        <div id="timer" hidden></div>
    </div>

    <script>
        let isBreathing = false, wakeLock = null;
        let timeLeft = 304, timerId = null;

        const formatTime = (s) => {
            const mins = Math.floor(s / 60);
            const secs = s % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        };

        const toggleLock = async (on) => {
            if (!('wakeLock' in navigator)) return;
            try {
                if (on) wakeLock = await navigator.wakeLock.request('screen');
                else if (wakeLock) { wakeLock.release(); wakeLock = null; }
            } catch {}
        };

        function handleClick() {
            if (isBreathing) reset();
            else start();
        }

        function start() {
            isBreathing = true;
            const startTime = Date.now();
            const totalMs = 304 * 1000;
            
            document.getElementById('start').hidden = true;
            document.getElementById('timer').hidden = false;
            document.getElementById('timer').textContent = formatTime(304);
            document.getElementById('inner-circle').hidden = false;
            
            const circle = document.getElementById('breath-circle');
            circle.classList.remove('breathing');
            void circle.offsetWidth; // Force reflow to restart animation
            circle.classList.add('breathing');
            
            toggleLock(true);

            timerId = setInterval(() => {
                const elapsedMs = Date.now() - startTime;
                timeLeft = Math.max(0, Math.ceil((totalMs - elapsedMs) / 1000));
                document.getElementById('timer').textContent = formatTime(timeLeft);
                
                if (timeLeft <= 0) reset();
            }, 100);
        }

        function reset() {
            isBreathing = false;
            clearInterval(timerId);
            timerId = null;
            
            document.getElementById('start').hidden = false;
            document.getElementById('timer').hidden = true;
            document.getElementById('inner-circle').hidden = true;
            document.getElementById('breath-circle').classList.remove('breathing');
            
            toggleLock(false);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isBreathing) toggleLock(true);
        });
    </script>
</body>
</html>
